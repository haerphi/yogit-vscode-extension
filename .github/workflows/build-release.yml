name: Build & Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Installer les dépendances
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Compiler
        run: pnpm run compile

      - name: Vérifier que le tag correspond à la version du package.json
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
              echo "::error::Le tag v$TAG_VERSION ne correspond pas à la version $PKG_VERSION du package.json"
              exit 1
          fi

      # Les dépendances runtime sont bundlées (esbuild) ou élidées (types),
      # donc --no-dependencies : évite les problèmes vsce/pnpm avec node_modules
      - name: Packager le .vsix
        run: pnpm dlx @vscode/vsce package --no-dependencies

      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: "*.vsix"
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix

      - name: Créer la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
          generate_release_notes: true
